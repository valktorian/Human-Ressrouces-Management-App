        }
    headers:
      - name: Content-Type
        value: application/json
      - name: Authorization
        value: Bearer {{ _.jwt_token }}
    authentication:
      type: bearer
      token: "{{ _.jwt_token }}"

  - _id: req_delete_profile
    _type: request
    parentId: fld_profile_command
    name: Delete Profile
    method: DELETE
    url: "{{ _.profile_command_base_url }}/api/profiles/{{ _.profile_id }}"
    headers:
      - name: Authorization
        value: Bearer {{ _.jwt_token }}
    authentication:
      type: bearer
      token: "{{ _.jwt_token }}"

  - _id: req_get_profiles
    _type: request
    parentId: fld_profile_query
    name: Get All Profiles
    method: GET
    url: "{{ _.profile_query_base_url }}/api/profiles"
    headers:
      - name: Authorization
        value: Bearer {{ _.jwt_token }}
    authentication:
