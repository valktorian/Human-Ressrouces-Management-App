  - _id: req_link_profile_account
    _type: request
    parentId: fld_profile_command
    name: Link Account
    method: POST
    url: "{{ _.profile_command_base_url }}/api/profiles/{{ _.profile_id }}/link-account"
    body:
      mimeType: application/json
      text: |
        {
          "accountId": "{{ _.account_id }}"
        }
    headers:
      - name: Content-Type
        value: application/json
      - name: Authorization
        value: Bearer {{ _.jwt_token }}
    authentication:
      type: bearer
      token: "{{ _.jwt_token }}"

  - _id: req_update_self_personal_info
