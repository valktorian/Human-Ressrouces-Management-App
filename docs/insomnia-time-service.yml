_type: export
__export_format: 4
__export_date: 2026-03-17T00:00:00.000Z
__export_source: codex.workforcehub
resources:
  - _id: wrk_time_service
    _type: workspace
    name: Time Service
    description: TimeService command and query requests with shared JWT login workflow.
    scope: collection

  - _id: env_time_service
    _type: environment
    parentId: wrk_time_service
    name: Local
    data:
      account_command_base_url: http://localhost:5222
      time_command_base_url: http://localhost:5033
      time_query_base_url: http://localhost:5257
      employee_id: 11111111-1111-1111-1111-111111111111
      time_entry_id: 11111111-1111-1111-1111-111111111111
      timesheet_id: 11111111-1111-1111-1111-111111111111
      leave_request_id: 11111111-1111-1111-1111-111111111111
      jwt_token: ""
      email: john.doe@local.test
      password: P@ssw0rd123!

  - _id: fld_time_auth
    _type: request_group
    parentId: wrk_time_service
    name: Auth

  - _id: fld_time_entries_command
    _type: request_group
    parentId: wrk_time_service
    name: Time Entries Command

  - _id: fld_timesheets_command
    _type: request_group
    parentId: wrk_time_service
    name: Timesheets Command

  - _id: fld_leave_command
    _type: request_group
    parentId: wrk_time_service
    name: Leave Command

  - _id: fld_time_entries_query
    _type: request_group
    parentId: wrk_time_service
    name: Time Entries Query

  - _id: fld_timesheets_query
    _type: request_group
    parentId: wrk_time_service
    name: Timesheets Query

  - _id: fld_leave_query
    _type: request_group
    parentId: wrk_time_service
    name: Leave Query

  - _id: fld_reference_query
    _type: request_group
    parentId: wrk_time_service
    name: Reference Query

  - _id: req_time_login
    _type: request
    parentId: fld_time_auth
    name: Login
    method: POST
    url: "{{ _.account_command_base_url }}/api/auth/login"
    body:
      mimeType: application/json
      text: |
        {
          "email": "{{ _.email }}",
          "password": "{{ _.password }}"
        }
    headers:
      - name: Content-Type
        value: application/json
    afterResponseScript: |
      let jsonBody = {};
      try {
        jsonBody = insomnia.response.json() || {};
      } catch (error) {
        return;
      }
      const accessToken = jsonBody.accessToken || jsonBody.AccessToken || "";
      const employeeId = jsonBody.accountId || jsonBody.AccountId || "";
      if (accessToken) {
        insomnia.environment.set("jwt_token", accessToken);
      }
      if (employeeId) {
        insomnia.environment.set("employee_id", employeeId);
      }
    settingStoreCookies: true
    settingSendCookies: true
    settingDisableRenderRequestBody: false
    settingEncodeUrl: true
    settingRebuildPath: true
    settingFollowRedirects: global

  - _id: req_create_time_entry
    _type: request
    parentId: fld_time_entries_command
    name: Create Time Entry
    method: POST
    url: "{{ _.time_command_base_url }}/api/time-entries"
    body:
      mimeType: application/json
      text: |
        {
          "employeeId": "{{ _.employee_id }}",
          "workDate": "2026-03-17",
          "startTime": "09:00:00",
          "endTime": "17:00:00",
          "projectCode": "HRM",
          "taskCode": "TIMESHEET",
          "notes": "Worked on planning"
        }
    headers:
      - name: Content-Type
        value: application/json
    authentication:
      type: bearer
      token: "{{ _.jwt_token }}"
    afterResponseScript: |
      let jsonBody = {};
      try {
        jsonBody = insomnia.response.json() || {};
      } catch (error) {
        return;
      }
      if (jsonBody.id) {
        insomnia.environment.set("time_entry_id", jsonBody.id);
      }

  - _id: req_update_time_entry
    _type: request
    parentId: fld_time_entries_command
    name: Update Time Entry
    method: PUT
    url: "{{ _.time_command_base_url }}/api/time-entries/{{ _.time_entry_id }}"
    body:
      mimeType: application/json
      text: |
        {
          "workDate": "2026-03-17",
          "startTime": "08:30:00",
          "endTime": "17:30:00",
          "projectCode": "HRM",
          "taskCode": "PLANNING",
          "notes": "Updated entry"
        }
    headers:
      - name: Content-Type
        value: application/json
    authentication:
      type: bearer
      token: "{{ _.jwt_token }}"

  - _id: req_delete_time_entry
    _type: request
    parentId: fld_time_entries_command
    name: Delete Time Entry
    method: DELETE
    url: "{{ _.time_command_base_url }}/api/time-entries/{{ _.time_entry_id }}"
    authentication:
      type: bearer
      token: "{{ _.jwt_token }}"

