_type: export
__export_format: 4
__export_date: 2026-03-17T00:00:00.000Z
__export_source: codex.workforcehub
resources:
  - _id: wrk_account_service
    _type: workspace
    name: Account Service
    description: AccountService requests with local environment and shared JWT token workflow.
    scope: collection

  - _id: env_account_service
    _type: environment
    parentId: wrk_account_service
    name: Local
    data:
      account_command_base_url: http://localhost:5222
      account_query_base_url: http://localhost:5115
      account_id: 11111111-1111-1111-1111-111111111111
      jwt_token: ""
      email: john.doe@local.test
      password: P@ssw0rd123!

  - _id: fld_account_auth
    _type: request_group
    parentId: wrk_account_service
    name: Auth

  - _id: fld_account_command
    _type: request_group
    parentId: wrk_account_service
    name: Command

  - _id: fld_account_query
    _type: request_group
    parentId: wrk_account_service
    name: Query

  - _id: req_login
    _type: request
    parentId: fld_account_auth
    name: Login
    method: POST
    url: "{{ _.account_command_base_url }}/api/auth/login"
    body:
      mimeType: application/json
      text: |
        {
          "email": "{{ _.email }}",
          "password": "{{ _.password }}"
        }
    headers:
      - name: Content-Type
        value: application/json
    afterResponseScript: |
      let jsonBody = {};
      try {
        jsonBody = insomnia.response.json() || {};
      } catch (error) {
        return;
      }
      const accessToken = jsonBody.accessToken || jsonBody.AccessToken || "";
      const accountId = jsonBody.accountId || jsonBody.AccountId || "";
      const email = jsonBody.email || jsonBody.Email || "";
      if (accessToken) {
        insomnia.environment.set("jwt_token", accessToken);
      }
      if (accountId) {
        insomnia.environment.set("account_id", accountId);
      }
      if (email) {
        insomnia.environment.set("email", email);
      }
    settingStoreCookies: true
    settingSendCookies: true
    settingDisableRenderRequestBody: false
    settingEncodeUrl: true
    settingRebuildPath: true
    settingFollowRedirects: global

  - _id: req_create_account
    _type: request
    parentId: fld_account_command
    name: Create Account
    method: POST
    url: "{{ _.account_command_base_url }}/api/accounts"
    body:
      mimeType: application/json
      text: |
        {
          "email": "{{ _.email }}",
          "password": "{{ _.password }}",
          "firstName": "John",
          "lastName": "Doe",
          "role": "HRAdmin"
        }
    headers:
      - name: Content-Type
        value: application/json
    afterResponseScript: |
      let jsonBody = {};
      try {
        jsonBody = insomnia.response.json() || {};
      } catch (error) {
        return;
      }
      if (jsonBody.accountId) {
        insomnia.environment.set("account_id", jsonBody.accountId);
      }
      if (jsonBody.email) {
        insomnia.environment.set("email", jsonBody.email);
      }
    settingStoreCookies: true
    settingSendCookies: true
    settingDisableRenderRequestBody: false
    settingEncodeUrl: true
    settingRebuildPath: true
    settingFollowRedirects: global

  - _id: req_update_account
    _type: request
    parentId: fld_account_command
    name: Update Account
    method: PUT
    url: "{{ _.account_command_base_url }}/api/accounts/{{ _.account_id }}"
    body:
      mimeType: application/json
      text: |
        {
          "email": "{{ _.email }}",
          "firstName": "John Updated",
          "lastName": "Doe Updated"
        }
    headers:
      - name: Content-Type
        value: application/json
      - name: Authorization
        value: Bearer {{ _.jwt_token }}
    authentication:
      type: bearer
      token: "{{ _.jwt_token }}"
    settingStoreCookies: true
    settingSendCookies: true
    settingDisableRenderRequestBody: false
    settingEncodeUrl: true
    settingRebuildPath: true
    settingFollowRedirects: global

  - _id: req_update_role
    _type: request
    parentId: fld_account_command
    name: Update Account Role
    method: PATCH
    url: "{{ _.account_command_base_url }}/api/accounts/{{ _.account_id }}/role"
    body:
      mimeType: application/json
      text: |
        {
          "role": "Manager"
        }
    headers:
      - name: Content-Type
        value: application/json
      - name: Authorization
        value: Bearer {{ _.jwt_token }}
    authentication:
      type: bearer
      token: "{{ _.jwt_token }}"
    settingStoreCookies: true
    settingSendCookies: true
    settingDisableRenderRequestBody: false
    settingEncodeUrl: true
    settingRebuildPath: true
    settingFollowRedirects: global

  - _id: req_change_password
    _type: request
    parentId: fld_account_command
    name: Change Account Password
    method: PATCH
    url: "{{ _.account_command_base_url }}/api/accounts/{{ _.account_id }}/password"
    body:
      mimeType: application/json
      text: |
        {
          "newPassword": "N3wP@ssw0rd456!"
        }
    headers:
      - name: Content-Type
        value: application/json
      - name: Authorization
        value: Bearer {{ _.jwt_token }}
    authentication:
      type: bearer
      token: "{{ _.jwt_token }}"
    settingStoreCookies: true
    settingSendCookies: true
    settingDisableRenderRequestBody: false
    settingEncodeUrl: true
    settingRebuildPath: true
    settingFollowRedirects: global

  - _id: req_delete_account
    _type: request
    parentId: fld_account_command
    name: Delete Account
    method: DELETE
    url: "{{ _.account_command_base_url }}/api/accounts/{{ _.account_id }}"
    headers:
      - name: Authorization
        value: Bearer {{ _.jwt_token }}
    authentication:
      type: bearer
      token: "{{ _.jwt_token }}"
    settingStoreCookies: true
    settingSendCookies: true
    settingDisableRenderRequestBody: false
    settingEncodeUrl: true
    settingRebuildPath: true
    settingFollowRedirects: global

  - _id: req_get_accounts
    _type: request
    parentId: fld_account_query
    name: Get All Accounts
    method: GET
    url: "{{ _.account_query_base_url }}/api/accounts"
    headers:
      - name: Authorization
        value: Bearer {{ _.jwt_token }}
    authentication:
      type: bearer
      token: "{{ _.jwt_token }}"
    settingStoreCookies: true
    settingSendCookies: true
    settingDisableRenderRequestBody: false
    settingEncodeUrl: true
    settingRebuildPath: true
    settingFollowRedirects: global

  - _id: req_get_account_by_id
    _type: request
    parentId: fld_account_query
    name: Get Account By Id
    method: GET
    url: "{{ _.account_query_base_url }}/api/accounts/{{ _.account_id }}"
    headers:
      - name: Authorization
        value: Bearer {{ _.jwt_token }}
    authentication:
      type: bearer
      token: "{{ _.jwt_token }}"
    settingStoreCookies: true
    settingSendCookies: true
    settingDisableRenderRequestBody: false
    settingEncodeUrl: true
    settingRebuildPath: true
    settingFollowRedirects: global
