name: Publish Docker Images

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ghcr.io/valktorian/workforcehub-gateway
            dockerfile: WorkForceHub.Gateway/Dockerfile
          - image: ghcr.io/valktorian/account-service-command
            dockerfile: AccountService/Command/Api/Dockerfile
          - image: ghcr.io/valktorian/account-service-query
            dockerfile: AccountService/Query/Api/Dockerfile
          - image: ghcr.io/valktorian/profile-service-command
            dockerfile: ProfileService/Command/Api/Dockerfile
          - image: ghcr.io/valktorian/profile-service-query
            dockerfile: ProfileService/Query/Api/Dockerfile
          - image: ghcr.io/valktorian/time-service-command
            dockerfile: TimeService/Command/Api/Dockerfile
          - image: ghcr.io/valktorian/time-service-query
            dockerfile: TimeService/Query/Api/Dockerfile
          - image: ghcr.io/valktorian/evolution-service-command
            dockerfile: EvolutionService/Command/Api/Dockerfile
          - image: ghcr.io/valktorian/evolution-service-query
            dockerfile: EvolutionService/Query/Api/Dockerfile
          - image: ghcr.io/valktorian/media-service
            dockerfile: MediaService/Api/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
