services:
  postgres_write:
    image: postgres:16
    container_name: postgres_write
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - "55433:5432"
    volumes:
      - pg_write_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 5s
      retries: 10
    profiles:
      - minimal
      - full

  mongo_read:
    image: mongo:7
    container_name: mongo_read
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:?MONGO_INITDB_ROOT_USERNAME is required}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:?MONGO_INITDB_ROOT_PASSWORD is required}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 10
    profiles:
      - minimal
      - full

  mongo_express:
    image: mongo-express
    container_name: mongo_express
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo_read
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME:?MONGO_INITDB_ROOT_USERNAME is required}:${MONGO_INITDB_ROOT_PASSWORD:?MONGO_INITDB_ROOT_PASSWORD is required}@mongo_read:27017
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_INITDB_ROOT_USERNAME:?MONGO_INITDB_ROOT_USERNAME is required}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:?MONGO_INITDB_ROOT_PASSWORD is required}
      ME_CONFIG_BASICAUTH: "true"
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USER:?MONGO_EXPRESS_USER is required}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD:?MONGO_EXPRESS_PASSWORD is required}
      ME_CONFIG_MONGODB_ENABLE_ADMIN: "true"
    depends_on:
      - mongo_read
    profiles:
      - minimal
      - full

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka-workforce
    restart: always
    environment:
      CLUSTER_ID: "QgS7Hq7hT7i4SlM0zvbYzw"
      KAFKA_CLUSTER_ID: "QgS7Hq7hT7i4SlM0zvbYzw"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_NODE_ID: "1"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_DEFAULT_REPLICATION_FACTOR: "1"
      KAFKA_MIN_INSYNC_REPLICAS: "1"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
    ports:
      - "29092:29092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    profiles:
      - minimal
      - full

  adminer:
    image: adminer
    container_name: adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - postgres_write
    profiles:
      - minimal
      - full

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui-workforce
    restart: always
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: "local"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:9092"
      KAFKA_CLUSTERS_0_ZOOKEEPER: ""
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      - kafka
    profiles:
      - minimal
      - full

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    restart: always
    ports:
      - "16686:16686"
      - "4317:4317"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    profiles:
      - full

  workforcehub-gateway:
    image: ghcr.io/valktorian/workforcehub-gateway:latest
    container_name: workforcehub-gateway
    restart: always
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ASPNETCORE_URLS=http://+:80
      - Jwt__SecretKey=${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      - Storage__InternalApiKey=${MEDIA_INTERNAL_API_KEY:?MEDIA_INTERNAL_API_KEY is required}
      - Jaeger__OtlpEndpoint=http://jaeger:4317
    profiles:
      - minimal
      - full

  account-service-command:
    image: ghcr.io/valktorian/account-service-command:latest
    container_name: account-service-command
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - Jwt__SecretKey=${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      - ConnectionStrings__DefaultConnection=Host=postgres_write;Port=5432;Database=account_write;Username=${POSTGRES_USER:?POSTGRES_USER is required};Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - Kafka__BootstrapServers=kafka:9092
      - Jaeger__OtlpEndpoint=http://jaeger:4317
    depends_on:
      - postgres_write
      - kafka
    profiles:
      - full

  account-service-query:
    image: ghcr.io/valktorian/account-service-query:latest
    container_name: account-service-query
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - Jwt__SecretKey=${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      - ConnectionStrings__ReadDatabase=mongodb://${MONGO_INITDB_ROOT_USERNAME:?MONGO_INITDB_ROOT_USERNAME is required}:${MONGO_INITDB_ROOT_PASSWORD:?MONGO_INITDB_ROOT_PASSWORD is required}@mongo_read:27017/admin?authSource=admin
      - Kafka__BootstrapServers=kafka:9092
      - Jaeger__OtlpEndpoint=http://jaeger:4317
    depends_on:
      - mongo_read
      - kafka
    profiles:
      - full

  profile-service-command:
    image: ghcr.io/valktorian/profile-service-command:latest
    container_name: profile-service-command
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - Jwt__SecretKey=${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      - ConnectionStrings__DefaultConnection=Host=postgres_write;Port=5432;Database=profile_write;Username=${POSTGRES_USER:?POSTGRES_USER is required};Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - Kafka__BootstrapServers=kafka:9092
      - Jaeger__OtlpEndpoint=http://jaeger:4317
    depends_on:
      - postgres_write
      - kafka
    profiles:
      - full

  profile-service-query:
    image: ghcr.io/valktorian/profile-service-query:latest
    container_name: profile-service-query
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - Jwt__SecretKey=${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      - ConnectionStrings__ReadDatabase=mongodb://${MONGO_INITDB_ROOT_USERNAME:?MONGO_INITDB_ROOT_USERNAME is required}:${MONGO_INITDB_ROOT_PASSWORD:?MONGO_INITDB_ROOT_PASSWORD is required}@mongo_read:27017/admin?authSource=admin
      - Kafka__BootstrapServers=kafka:9092
      - Jaeger__OtlpEndpoint=http://jaeger:4317
    depends_on:
      - mongo_read
      - kafka
    profiles:
      - full

  time-service-command:
    image: ghcr.io/valktorian/time-service-command:latest
    container_name: time-service-command
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - Jwt__SecretKey=${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      - ConnectionStrings__DefaultConnection=Host=postgres_write;Port=5432;Database=time_write;Username=${POSTGRES_USER:?POSTGRES_USER is required};Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - Kafka__BootstrapServers=kafka:9092
      - Jaeger__OtlpEndpoint=http://jaeger:4317
    depends_on:
      - postgres_write
      - kafka
    profiles:
      - full

  time-service-query:
    image: ghcr.io/valktorian/time-service-query:latest
    container_name: time-service-query
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - Jwt__SecretKey=${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      - ConnectionStrings__ReadDatabase=mongodb://${MONGO_INITDB_ROOT_USERNAME:?MONGO_INITDB_ROOT_USERNAME is required}:${MONGO_INITDB_ROOT_PASSWORD:?MONGO_INITDB_ROOT_PASSWORD is required}@mongo_read:27017/admin?authSource=admin
      - Kafka__BootstrapServers=kafka:9092
      - Jaeger__OtlpEndpoint=http://jaeger:4317
    depends_on:
      - mongo_read
      - kafka
    profiles:
      - full

  evolution-service-command:
    image: ghcr.io/valktorian/evolution-service-command:latest
    container_name: evolution-service-command
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - Jwt__SecretKey=${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      - ConnectionStrings__DefaultConnection=Host=postgres_write;Port=5432;Database=evolution_write;Username=${POSTGRES_USER:?POSTGRES_USER is required};Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - Kafka__BootstrapServers=kafka:9092
      - Jaeger__OtlpEndpoint=http://jaeger:4317
    depends_on:
      - postgres_write
      - kafka
    profiles:
      - full

  evolution-service-query:
    image: ghcr.io/valktorian/evolution-service-query:latest
    container_name: evolution-service-query
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - Jwt__SecretKey=${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      - ConnectionStrings__ReadDatabase=mongodb://${MONGO_INITDB_ROOT_USERNAME:?MONGO_INITDB_ROOT_USERNAME is required}:${MONGO_INITDB_ROOT_PASSWORD:?MONGO_INITDB_ROOT_PASSWORD is required}@mongo_read:27017/admin?authSource=admin
      - Kafka__BootstrapServers=kafka:9092
      - Jaeger__OtlpEndpoint=http://jaeger:4317
    depends_on:
      - mongo_read
      - kafka
    profiles:
      - full

  media-service:
    image: ghcr.io/valktorian/media-service:latest
    container_name: media-service
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - Storage__InternalApiKey=${MEDIA_INTERNAL_API_KEY:?MEDIA_INTERNAL_API_KEY is required}
      - Jaeger__OtlpEndpoint=http://jaeger:4317
    volumes:
      - media_uploads:/app/uploads
    profiles:
      - full

volumes:
  pg_write_data:
  mongo_data:
  kafka_data:
  media_uploads:
